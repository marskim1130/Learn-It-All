<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt 变量渲染 Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0 auto;
        max-width: 48rem;
        padding: 1.5rem;
        line-height: 1.6;
      }
      label {
        display: block;
        margin-top: 0.75rem;
      }
      input,
      textarea,
      button {
        font: inherit;
        margin-top: 0.25rem;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem 0.75rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      pre {
        overflow: auto;
        padding: 0.75rem 1rem;
        border: 1px solid color-mix(in oklab, CanvasText 20%, Canvas);
        border-radius: 0.5rem;
        white-space: pre-wrap;
      }
      #variable-fields {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>Prompt 变量渲染 Demo</h1>
    <p>
      先登录并创建含 <code>{{var}}</code> 的模板，再加载变量表单，填值后发送到会话。
      服务端负责校验与渲染。
    </p>

    <label>API <input id="base-url" value="http://localhost:3001" /></label>
    <label>邮箱 <input id="email" value="alice@example.com" /></label>
    <label>密码 <input id="password" type="password" value="password123" /></label>
    <label>模板 ID <input id="template-id" /></label>
    <label>会话 ID <input id="conversation-id" /></label>
    <label>
      模板正文（创建用）
      <textarea id="body" rows="3">你好 {{name}}，今天聊 {{topic}}</textarea>
    </label>
    <div id="variable-fields"></div>
    <div class="actions">
      <button type="button" id="login-btn">登录</button>
      <button type="button" id="create-template-btn">创建模板</button>
      <button type="button" id="create-conversation-btn">创建会话</button>
      <button type="button" id="load-vars-btn">加载变量表单</button>
      <button type="button" id="send-btn">渲染并发送</button>
    </div>
    <pre id="result">等待操作…</pre>

    <script>
      const result = document.getElementById("result");
      const fields = document.getElementById("variable-fields");
      const baseUrl = () => document.getElementById("base-url").value.replace(/\/$/, "");

      async function call(path, options = {}) {
        const response = await fetch(`${baseUrl()}${path}`, {
          credentials: "include",
          headers: { "content-type": "application/json", ...(options.headers ?? {}) },
          ...options,
        });
        const text = await response.text();
        result.textContent = `${options.method ?? "GET"} ${path}\nstatus: ${response.status}\n\n${text}`;
        try {
          return { response, body: text ? JSON.parse(text) : null };
        } catch {
          return { response, body: null };
        }
      }

      document.getElementById("login-btn").onclick = () =>
        call("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });

      document.getElementById("create-template-btn").onclick = async () => {
        const { body } = await call("/prompt-templates", {
          method: "POST",
          body: JSON.stringify({
            name: "变量问候",
            description: "demo",
            body: document.getElementById("body").value,
            tags: ["demo"],
          }),
        });
        if (body?.promptTemplate?.id) {
          document.getElementById("template-id").value = body.promptTemplate.id;
        }
      };

      document.getElementById("create-conversation-btn").onclick = async () => {
        const { body } = await call("/conversations", {
          method: "POST",
          body: JSON.stringify({ title: "变量演示" }),
        });
        if (body?.conversation?.id) {
          document.getElementById("conversation-id").value = body.conversation.id;
        }
      };

      document.getElementById("load-vars-btn").onclick = async () => {
        const id = document.getElementById("template-id").value;
        if (!id) {
          result.textContent = "请先填写模板 ID";
          return;
        }
        const { body } = await call(`/prompt-templates/${id}/variables`);
        fields.innerHTML = "";
        for (const name of body?.variables ?? []) {
          const label = document.createElement("label");
          label.textContent = name;
          const input = document.createElement("input");
          input.dataset.varName = name;
          input.placeholder = name;
          label.appendChild(input);
          fields.appendChild(label);
        }
      };

      document.getElementById("send-btn").onclick = async () => {
        const templateId = document.getElementById("template-id").value;
        const conversationId = document.getElementById("conversation-id").value;
        if (!templateId || !conversationId) {
          result.textContent = "请先填写模板 ID 与会话 ID";
          return;
        }
        const variables = {};
        for (const input of fields.querySelectorAll("input[data-var-name]")) {
          variables[input.dataset.varName] = input.value;
        }
        await call(`/conversations/${conversationId}/messages`, {
          method: "POST",
          body: JSON.stringify({
            promptTemplateId: templateId,
            variables,
          }),
        });
      };
    </script>
  </body>
</html>
